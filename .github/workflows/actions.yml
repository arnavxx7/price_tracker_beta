name: run tracker_script.py

on:
  schedule:
    - cron: '45 12 */7 * *' 

  workflow_dispatch:

jobs:
  script_execution:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo content
        uses: actions/checkout@v2

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
        
      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: execute python script 
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_HOSTNAME: ${{ secrets.DB_HOSTNAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_HOSTNAME: ${{ secrets.PROXY_HOSTNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
          PROXY_PORT:  ${{ secrets.PROXY_PORT }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          RESEND_EMAIL_API_KEY: ${{ secrets.RESEND_EMAIL_API_KEY }}
        run: python tracker_script.py

      - name: Upload logs
        if: always()  # upload even if the script failed
        uses: actions/upload-artifact@v4
        with:
          name: tracker-logs-${{ github.run_id }}
          path: logs/          # whatever your log folder is
          retention-days: 30